<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Market | Dijital Ürün Mağazası</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="logo">GameMarket</a>
            <div class="nav-actions">
                <button class="filter-btn" id="show-favorites">
                    <i class="fas fa-heart"></i> Favorilerim
                </button>
            </div>
        </header>

        <main>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Ürün ara (örn: Valorant, Steam)...">
                </div>
                <div class="filter-box" id="category-filters">
                    <button class="filter-btn active" data-category="all">Tümü</button>
                    <!-- Kategoriler JS ile buraya eklenebilir veya manuel sabit tutulabilir -->
                    <button class="filter-btn" data-category="PUBG">PUBG</button>
                    <button class="filter-btn" data-category="Valorant">Valorant</button>
                    <button class="filter-btn" data-category="Steam">Steam</button>
                    <button class="filter-btn" data-category="Roblox">Roblox</button>
                    <button class="filter-btn" data-category="Dijital">Dijital</button>
                </div>
            </div>

            <div id="product-list" class="product-grid">
                <!-- Ürünler JS ile buraya gelecek -->
                <div class="loading-spinner"></div>
            </div>

            <div class="pagination" id="pagination">
                <button class="page-btn" id="prev-page" disabled>
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span class="page-info">Sayfa <span id="current-page">1</span> / <span id="total-pages">1</span></span>
                <button class="page-btn" id="next-page">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">Mesaj buraya gelecek</div>

    <script src="app.js"></script>
</body>
</html>
